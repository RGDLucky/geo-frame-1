services:
  api-service:
    build: ./api-service
    ports:
      - "8000:8000"
    volumes:
      - ./api-service:/app
      - ./frontend:/app/frontend
      - /app/node_modules
    env_file:
      - ./api-service/.env
    command: npm run dev
    depends_on:
      - model-service

  model-service:
    build: ./model-service
    ports:
      - "50051:50051"
    volumes:
      - ./model-service:/app
      - /app/.venv
    env_file:
      - ./model-service/.env
    command: python -m app.main

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: geo_int
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: